# NOTE: To see streaming build logs in Coolify, set these env vars in the
# Coolify service's "Build-time Environment Variables" (or server env):
#   DOCKER_BUILDKIT=1
#   BUILDKIT_PROGRESS=plain
#   COMPOSE_DOCKER_CLI_BUILD=1
# Without BUILDKIT_PROGRESS=plain, BuildKit collapses log output and Coolify
# only shows a spinner instead of the line-by-line ">>> [install] ..." markers.
#
# Host ports intentionally omitted for internal services. Coolify already runs
# its own MinIO/DB instances on shared hosts, so binding 3306/6379/9000 would
# conflict. Services still reach each other over the internal docker network
# by service name (mysql:3306, redis:6379, minio:9000). If you need external
# admin access (MinIO console, MailHog UI, etc.), add a `ports:` section back
# on a free host port OR configure a Coolify subdomain → internal service.

services:
  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: dub
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dubpassword}
      MYSQL_ROOT_HOST: "%"
    command:
      [
        "--max_connections=1000",
        "--default-authentication-plugin=mysql_native_password",
      ]
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-dubredis}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dubredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- ClickHouse (analytics) ----
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: always
    environment:
      CLICKHOUSE_DB: dub
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dubclickhouse}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./selfhost/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO bucket init ----
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/dub-public;
      mc mb --ignore-existing myminio/dub-private;
      mc anonymous set download myminio/dub-public;
      echo 'MinIO buckets initialized';
      "

  # ---- MailHog (SMTP for dev) ----
  mailhog:
    image: mailhog/mailhog:latest
    restart: always

  # ---- Dub Web App ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Raise build memory ceiling (Coolify/small VPS default can OOM here)
      shm_size: "1gb"
    restart: always
    # Coolify routes traffic to container port 3000 via its own proxy.
    # No host port binding -> no conflicts with other Coolify apps.
    expose:
      - "3000"
    env_file:
      - .env.selfhost
    environment:
      - SELF_HOSTED=true
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-dubpassword}@mysql:3306/dub
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dubredis}@redis:6379
      - CLICKHOUSE_URL=http://default:${CLICKHOUSE_PASSWORD:-dubclickhouse}@clickhouse:8123
      - CLICKHOUSE_DB=dub
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_PUBLIC_BUCKET=dub-public
      - STORAGE_PRIVATE_BUCKET=dub-private
      - STORAGE_BASE_URL=${STORAGE_BASE_URL:-http://minio:9000/dub-public}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  mysql-data:
  redis-data:
  clickhouse-data:
  minio-data:
