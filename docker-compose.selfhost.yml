version: "3.8"

services:
  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: dub
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dubpassword}
      MYSQL_ROOT_HOST: "%"
    command:
      [
        "--max_connections=1000",
        "--default-authentication-plugin=mysql_native_password",
      ]
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-dubredis}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dubredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- ClickHouse (analytics) ----
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: always
    environment:
      CLICKHOUSE_DB: dub
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dubclickhouse}
    ports:
      - "8123:8123"
      - "9200:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./selfhost/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO bucket init ----
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/dub-public;
      mc mb --ignore-existing myminio/dub-private;
      mc anonymous set download myminio/dub-public;
      echo 'MinIO buckets initialized';
      "

  # ---- MailHog (SMTP for dev) ----
  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  # ---- Dub Web App ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.selfhost
    environment:
      - SELF_HOSTED=true
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-dubpassword}@mysql:3306/dub
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dubredis}@redis:6379
      - CLICKHOUSE_URL=http://default:${CLICKHOUSE_PASSWORD:-dubclickhouse}@clickhouse:8123
      - CLICKHOUSE_DB=dub
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_PUBLIC_BUCKET=dub-public
      - STORAGE_PRIVATE_BUCKET=dub-private
      - STORAGE_BASE_URL=${STORAGE_BASE_URL:-http://localhost:9000/dub-public}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  mysql-data:
  redis-data:
  clickhouse-data:
  minio-data:
